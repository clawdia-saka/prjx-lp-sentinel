name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate JSON examples
        run: |
          python3 -m json.tool config/prjx_lp_monitor.example.json >/dev/null
          python3 -m json.tool examples/prjx_lp_positions.sample.json >/dev/null

      - name: Compile monitor
        run: python3 -m py_compile scripts/prjx_lp_monitor.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -q

      - name: Snapshot smoke
        run: |
          python3 scripts/prjx_lp_monitor.py \
            --config config/prjx_lp_monitor.example.json \
            --source snapshot \
            --no-send

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
